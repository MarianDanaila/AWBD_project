name: CI

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master ]

jobs:
  build-monolith:
    name: Build & Test Monolith
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-monolith-${{ hashFiles('build.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-monolith-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and test
        run: ./gradlew build

  build-microservices:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - eureka-server
          - config-server
          - user-service
          - fitness-service
          - nutrition-service
          - api-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ matrix.service }}-${{ hashFiles(format('{0}/build.gradle', matrix.service), format('{0}/gradle/wrapper/gradle-wrapper.properties', matrix.service)) }}
          restore-keys: ${{ runner.os }}-gradle-${{ matrix.service }}-

      - name: Grant execute permission for gradlew
        run: chmod +x ${{ matrix.service }}/gradlew

      - name: Build ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}
          ./gradlew build -x test
