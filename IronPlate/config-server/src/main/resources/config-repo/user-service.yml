server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/ironplate_users?createDatabaseIfNotExist=true
    username: root
    password: ironplate
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

jwt:
  secret: ironplate-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000
