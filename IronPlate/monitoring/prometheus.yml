global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'user-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['user-service:8081']

  - job_name: 'fitness-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['fitness-service:8082']

  - job_name: 'nutrition-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['nutrition-service:8083']
