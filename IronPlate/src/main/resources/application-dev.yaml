spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ironplate_dev
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

logging:
  level:
    com.awbd.ironplate: DEBUG
    org.hibernate.SQL: DEBUG
