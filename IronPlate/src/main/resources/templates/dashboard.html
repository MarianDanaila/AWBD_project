<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - IronPlate</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">IronPlate</a>
        <div class="d-flex align-items-center text-white gap-3">
            <span sec:authentication="name"></span>
            <form th:action="@{/logout}" method="post" class="mb-0">
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h1>Welcome, <span sec:authentication="name"></span>!</h1>
    <p class="text-muted">You are logged in as: <strong sec:authentication="principal.authorities"></strong></p>

    <div class="row mt-4 g-3">
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">Training Programs</h5>
                    <p class="card-text">Manage your workout routines and exercises.</p>
                    <a th:href="@{/training-programs}" class="btn btn-primary">View Programs</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">Meal Plans</h5>
                    <p class="card-text">Track your nutrition and daily calorie goals.</p>
                    <a th:href="@{/meal-plans}" class="btn btn-success">View Meal Plans</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title">Exercises</h5>
                    <p class="card-text">Browse and manage the exercise library.</p>
                    <a th:href="@{/exercises}" class="btn btn-warning">View Exercises</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
