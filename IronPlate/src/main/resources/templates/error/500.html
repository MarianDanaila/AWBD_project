<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Server Error - IronPlate</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container text-center" style="margin-top: 80px;">
    <h1 class="display-1 fw-bold text-warning">500</h1>
    <h2 class="mb-3">Something Went Wrong</h2>
    <p class="text-muted mb-4">An unexpected error occurred. Please try again later.</p>
    <a th:href="@{/dashboard}" class="btn btn-primary">Go to Dashboard</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
