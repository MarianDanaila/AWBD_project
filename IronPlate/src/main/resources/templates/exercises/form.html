<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${exercise.id == null} ? 'New Exercise' : 'Edit Exercise' + ' - IronPlate'"></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container" style="max-width: 600px;">
    <h2 th:text="${exercise.id == null} ? 'New Exercise' : 'Edit Exercise'"></h2>
    <hr>

    <form th:action="${exercise.id == null} ? @{/exercises/new} : @{/exercises/{id}/edit(id=${exercise.id})}"
          th:object="${exercise}" method="post">

        <div class="mb-3">
            <label class="form-label">Name <span class="text-danger">*</span></label>
            <input type="text" th:field="*{name}" class="form-control"
                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea th:field="*{description}" class="form-control" rows="3"
                      th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"></textarea>
            <div class="invalid-feedback" th:errors="*{description}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Muscle Group <span class="text-danger">*</span></label>
            <select th:field="*{muscleGroup}" class="form-select"
                    th:classappend="${#fields.hasErrors('muscleGroup')} ? 'is-invalid'">
                <option value="">-- Select --</option>
                <option th:each="mg : ${muscleGroups}" th:value="${mg}" th:text="${mg}"></option>
            </select>
            <div class="invalid-feedback" th:errors="*{muscleGroup}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Exercise Type <span class="text-danger">*</span></label>
            <select th:field="*{exerciseType}" class="form-select"
                    th:classappend="${#fields.hasErrors('exerciseType')} ? 'is-invalid'">
                <option value="">-- Select --</option>
                <option th:each="et : ${exerciseTypes}" th:value="${et}" th:text="${et}"></option>
            </select>
            <div class="invalid-feedback" th:errors="*{exerciseType}"></div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a th:href="@{/exercises}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
