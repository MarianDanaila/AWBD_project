<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${exercise.name} + ' - IronPlate'"></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container" style="max-width: 600px;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 th:text="${exercise.name}"></h2>
        <div class="d-flex gap-2">
            <a th:href="@{/exercises/{id}/edit(id=${exercise.id})}" class="btn btn-warning"
               sec:authorize="hasAnyRole('COACH','ADMIN')">Edit</a>
            <a th:href="@{/exercises}" class="btn btn-outline-secondary">Back</a>
        </div>
    </div>
    <hr>

    <dl class="row">
        <dt class="col-sm-4">Muscle Group</dt>
        <dd class="col-sm-8"><span class="badge bg-secondary" th:text="${exercise.muscleGroup}"></span></dd>

        <dt class="col-sm-4">Exercise Type</dt>
        <dd class="col-sm-8"><span class="badge bg-info text-dark" th:text="${exercise.exerciseType}"></span></dd>

        <dt class="col-sm-4">Description</dt>
        <dd class="col-sm-8" th:text="${exercise.description ?: 'No description'}"></dd>
    </dl>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
