<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Food Items - IronPlate</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Food Items</h2>
        <a th:href="@{/food-items/new}" class="btn btn-primary">+ Add Food Item</a>
    </div>

    <form th:action="@{/food-items}" method="get" class="d-flex gap-2 mb-3">
        <input type="text" name="search" class="form-control" placeholder="Search by name..."
               th:value="${search}">
        <button type="submit" class="btn btn-outline-secondary">Search</button>
        <a th:href="@{/food-items}" class="btn btn-outline-danger">Clear</a>
    </form>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th><a th:href="@{/food-items(sort='name',search=${search})}" class="text-white text-decoration-none">Name</a></th>
            <th><a th:href="@{/food-items(sort='category',search=${search})}" class="text-white text-decoration-none">Category</a></th>
            <th>Calories/100g</th>
            <th>Protein/100g</th>
            <th>Carbs/100g</th>
            <th>Fat/100g</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${foodItems}">
            <td><a th:href="@{/food-items/{id}(id=${item.id})}" th:text="${item.name}"></a></td>
            <td><span class="badge bg-secondary" th:text="${item.category}"></span></td>
            <td th:text="${item.caloriesPer100g != null ? item.caloriesPer100g + ' kcal' : '-'}"></td>
            <td th:text="${item.proteinPer100g != null ? item.proteinPer100g + ' g' : '-'}"></td>
            <td th:text="${item.carbsPer100g != null ? item.carbsPer100g + ' g' : '-'}"></td>
            <td th:text="${item.fatPer100g != null ? item.fatPer100g + ' g' : '-'}"></td>
            <td class="d-flex gap-1">
                <a th:href="@{/food-items/{id}/edit(id=${item.id})}" class="btn btn-sm btn-warning">Edit</a>
                <form th:action="@{/food-items/{id}/delete(id=${item.id})}" method="post"
                      onsubmit="return confirm('Delete this food item?')">
                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                </form>
            </td>
        </tr>
        <tr th:if="${foodItems.isEmpty()}">
            <td colspan="7" class="text-center text-muted">No food items found.</td>
        </tr>
        </tbody>
    </table>

    <nav th:if="${foodItems.totalPages > 1}">
        <ul class="pagination">
            <li class="page-item" th:classappend="${foodItems.first} ? 'disabled'">
                <a class="page-link" th:href="@{/food-items(page=${foodItems.number - 1},sort=${sort},search=${search})}">Previous</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, foodItems.totalPages - 1)}"
                th:classappend="${i == foodItems.number} ? 'active'">
                <a class="page-link" th:href="@{/food-items(page=${i},sort=${sort},search=${search})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${foodItems.last} ? 'disabled'">
                <a class="page-link" th:href="@{/food-items(page=${foodItems.number + 1},sort=${sort},search=${search})}">Next</a>
            </li>
        </ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
