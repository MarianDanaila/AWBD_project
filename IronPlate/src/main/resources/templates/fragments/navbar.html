<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">IronPlate</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/exercises}">Exercises</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/training-programs}">Training Programs</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/food-items}">Food Items</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/meal-plans}">Meal Plans</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/users}">Users</a>
                </li>
            </ul>
            <div class="d-flex align-items-center gap-3">
                <span class="text-light" sec:authentication="name"></span>
                <form th:action="@{/logout}" method="post" class="mb-0">
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
