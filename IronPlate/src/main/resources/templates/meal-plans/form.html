<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${mealPlan.id != null ? 'Edit Meal Plan' : 'New Meal Plan'} + ' - IronPlate'"></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container" style="max-width: 600px;">
    <h2 th:text="${mealPlan.id != null ? 'Edit Meal Plan' : 'New Meal Plan'}"></h2>
    <hr>

    <form th:action="${mealPlan.id != null ? '/meal-plans/' + mealPlan.id + '/edit' : '/meal-plans/new'}"
          th:object="${mealPlan}" method="post" novalidate>

        <div class="mb-3">
            <label class="form-label fw-semibold">Name *</label>
            <input type="text" class="form-control" th:field="*{name}"
                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{name}"></div>
        </div>

        <div class="row g-3 mb-3">
            <div class="col">
                <label class="form-label">Start Date</label>
                <input type="date" class="form-control" th:field="*{startDate}">
            </div>
            <div class="col">
                <label class="form-label">End Date</label>
                <input type="date" class="form-control" th:field="*{endDate}">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Daily Calorie Target (kcal)</label>
            <input type="number" class="form-control" th:field="*{dailyCalorieTarget}" min="500" max="10000"
                   th:classappend="${#fields.hasErrors('dailyCalorieTarget')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{dailyCalorieTarget}"></div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a th:href="@{/meal-plans}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
