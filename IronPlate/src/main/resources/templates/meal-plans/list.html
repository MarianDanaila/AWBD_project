<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Meal Plans - IronPlate</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Meal Plans</h2>
        <a th:href="@{/meal-plans/new}" class="btn btn-primary">+ New Meal Plan</a>
    </div>

    <p th:if="${isAdmin}" class="text-muted small">Showing all meal plans (admin view)</p>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th><a th:href="@{/meal-plans(sort='name')}" class="text-white text-decoration-none">Name</a></th>
            <th>Start Date</th>
            <th>End Date</th>
            <th><a th:href="@{/meal-plans(sort='dailyCalorieTarget')}" class="text-white text-decoration-none">Daily Calories</a></th>
            <th th:if="${isAdmin}">Owner</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="plan : ${mealPlans}">
            <td><a th:href="@{/meal-plans/{id}(id=${plan.id})}" th:text="${plan.name}"></a></td>
            <td th:text="${plan.startDate != null ? plan.startDate : '-'}"></td>
            <td th:text="${plan.endDate != null ? plan.endDate : '-'}"></td>
            <td th:text="${plan.dailyCalorieTarget != null ? plan.dailyCalorieTarget + ' kcal' : '-'}"></td>
            <td th:if="${isAdmin}" th:text="${plan.user.username}"></td>
            <td class="d-flex gap-1">
                <a th:href="@{/meal-plans/{id}/edit(id=${plan.id})}" class="btn btn-sm btn-warning">Edit</a>
                <form th:action="@{/meal-plans/{id}/delete(id=${plan.id})}" method="post"
                      onsubmit="return confirm('Delete this meal plan?')">
                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                </form>
            </td>
        </tr>
        <tr th:if="${mealPlans.isEmpty()}">
            <td colspan="6" class="text-center text-muted">No meal plans found. Create your first one!</td>
        </tr>
        </tbody>
    </table>

    <nav th:if="${mealPlans.totalPages > 1}">
        <ul class="pagination">
            <li class="page-item" th:classappend="${mealPlans.first} ? 'disabled'">
                <a class="page-link" th:href="@{/meal-plans(page=${mealPlans.number - 1},sort=${sort})}">Previous</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, mealPlans.totalPages - 1)}"
                th:classappend="${i == mealPlans.number} ? 'active'">
                <a class="page-link" th:href="@{/meal-plans(page=${i},sort=${sort})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${mealPlans.last} ? 'disabled'">
                <a class="page-link" th:href="@{/meal-plans(page=${mealPlans.number + 1},sort=${sort})}">Next</a>
            </li>
        </ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
