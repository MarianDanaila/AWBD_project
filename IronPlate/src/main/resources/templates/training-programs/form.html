<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${program.id != null ? 'Edit Program' : 'New Program'} + ' - IronPlate'"></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container" style="max-width: 600px;">
    <h2 th:text="${program.id != null ? 'Edit Training Program' : 'New Training Program'}"></h2>
    <hr>

    <form th:action="${program.id != null ? '/training-programs/' + program.id + '/edit' : '/training-programs/new'}"
          th:object="${program}" method="post" novalidate>

        <div class="mb-3">
            <label class="form-label fw-semibold">Name *</label>
            <input type="text" class="form-control" th:field="*{name}"
                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{name}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold">Difficulty Level *</label>
            <select class="form-select" th:field="*{difficultyLevel}"
                    th:classappend="${#fields.hasErrors('difficultyLevel')} ? 'is-invalid'">
                <option value="">-- Select difficulty --</option>
                <option th:each="level : ${difficultyLevels}" th:value="${level}" th:text="${level}"></option>
            </select>
            <div class="invalid-feedback" th:errors="*{difficultyLevel}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Duration (weeks)</label>
            <input type="number" class="form-control" th:field="*{durationWeeks}" min="1" max="52"
                   th:classappend="${#fields.hasErrors('durationWeeks')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{durationWeeks}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" th:field="*{description}" rows="3"
                      th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"></textarea>
            <div class="invalid-feedback" th:errors="*{description}"></div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a th:href="@{/training-programs}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
