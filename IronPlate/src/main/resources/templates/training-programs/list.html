<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Training Programs - IronPlate</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Training Programs</h2>
        <a th:href="@{/training-programs/new}" class="btn btn-primary">+ New Program</a>
    </div>

    <p th:if="${isAdmin}" class="text-muted small">Showing all programs (admin view)</p>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th><a th:href="@{/training-programs(sort='name')}" class="text-white text-decoration-none">Name</a></th>
            <th><a th:href="@{/training-programs(sort='difficultyLevel')}" class="text-white text-decoration-none">Difficulty</a></th>
            <th>Duration (weeks)</th>
            <th th:if="${isAdmin}">Owner</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="program : ${programs}">
            <td><a th:href="@{/training-programs/{id}(id=${program.id})}" th:text="${program.name}"></a></td>
            <td>
                <span class="badge"
                      th:classappend="${program.difficultyLevel.name() == 'BEGINNER'} ? 'bg-success' : (${program.difficultyLevel.name() == 'INTERMEDIATE'} ? 'bg-warning text-dark' : 'bg-danger')"
                      th:text="${program.difficultyLevel}"></span>
            </td>
            <td th:text="${program.durationWeeks != null ? program.durationWeeks : '-'}"></td>
            <td th:if="${isAdmin}" th:text="${program.user.username}"></td>
            <td class="d-flex gap-1">
                <a th:href="@{/training-programs/{id}/edit(id=${program.id})}" class="btn btn-sm btn-warning">Edit</a>
                <form th:action="@{/training-programs/{id}/delete(id=${program.id})}" method="post"
                      onsubmit="return confirm('Delete this program?')">
                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                </form>
            </td>
        </tr>
        <tr th:if="${programs.isEmpty()}">
            <td colspan="5" class="text-center text-muted">No training programs found. Create your first one!</td>
        </tr>
        </tbody>
    </table>

    <nav th:if="${programs.totalPages > 1}">
        <ul class="pagination">
            <li class="page-item" th:classappend="${programs.first} ? 'disabled'">
                <a class="page-link" th:href="@{/training-programs(page=${programs.number - 1},sort=${sort})}">Previous</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, programs.totalPages - 1)}"
                th:classappend="${i == programs.number} ? 'active'">
                <a class="page-link" th:href="@{/training-programs(page=${i},sort=${sort})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${programs.last} ? 'disabled'">
                <a class="page-link" th:href="@{/training-programs(page=${programs.number + 1},sort=${sort})}">Next</a>
            </li>
        </ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
