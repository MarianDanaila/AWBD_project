<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${program.name} + ' - IronPlate'"></title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container" style="max-width: 600px;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 th:text="${program.name}"></h2>
        <div class="d-flex gap-2">
            <a th:href="@{/training-programs/{id}/edit(id=${program.id})}" class="btn btn-warning">Edit</a>
            <a th:href="@{/training-programs}" class="btn btn-outline-secondary">Back</a>
        </div>
    </div>
    <hr>

    <dl class="row">
        <dt class="col-sm-4">Difficulty</dt>
        <dd class="col-sm-8">
            <span class="badge"
                  th:classappend="${program.difficultyLevel.name() == 'BEGINNER'} ? 'bg-success' : (${program.difficultyLevel.name() == 'INTERMEDIATE'} ? 'bg-warning text-dark' : 'bg-danger')"
                  th:text="${program.difficultyLevel}"></span>
        </dd>

        <dt class="col-sm-4">Duration</dt>
        <dd class="col-sm-8" th:text="${program.durationWeeks != null ? program.durationWeeks + ' weeks' : '-'}"></dd>

        <dt class="col-sm-4">Owner</dt>
        <dd class="col-sm-8" th:text="${program.user.username}"></dd>

        <dt class="col-sm-4">Description</dt>
        <dd class="col-sm-8" th:text="${program.description ?: 'No description'}"></dd>

        <dt class="col-sm-4">Exercises</dt>
        <dd class="col-sm-8">
            <span th:if="${program.exercises.isEmpty()}" class="text-muted">None assigned</span>
            <span th:each="exercise, iter : ${program.exercises}">
                <span class="badge bg-secondary" th:text="${exercise.name}"></span>
            </span>
        </dd>
    </dl>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
